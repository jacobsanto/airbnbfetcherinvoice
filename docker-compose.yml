version: '3.9'

services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - '3001:3001'
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src

  scraper:
    build:
      context: .
      dockerfile: docker/scraper.Dockerfile
    env_file:
      - ./scraper/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - BACKEND_API_URL=http://backend:3001/v1
    depends_on:
      redis:
        condition: service_healthy
    shm_size: '256mb'

volumes:
  redis_data:
